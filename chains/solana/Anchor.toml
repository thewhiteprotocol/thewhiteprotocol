[toolchain]
anchor_version = "0.32.1"

[features]
resolution = true
skip-lint = false

[programs.devnet]
white_protocol = "DbYzCrBEt1Efxf9LB2P7A6vqPjuA8ugDBh1kCunESJZk"

[programs.localnet]
white_protocol = "DbYzCrBEt1Efxf9LB2P7A6vqPjuA8ugDBh1kCunESJZk"

[programs.mainnet]
white_protocol = "DbYzCrBEt1Efxf9LB2P7A6vqPjuA8ugDBh1kCunESJZk"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
