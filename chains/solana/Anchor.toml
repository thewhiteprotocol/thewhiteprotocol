[toolchain]
anchor_version = "0.32.1"

[features]
resolution = true
skip-lint = false

[programs.devnet]
white_protocol = "C9GAJTFVgijNzB4SWZeNKmzruzjzrZ4H6J1DpKha9GoW"
white_bridge_solana = "So11111111111111111111111111111111111111112"

[programs.localnet]
white_protocol = "C9GAJTFVgijNzB4SWZeNKmzruzjzrZ4H6J1DpKha9GoW"
white_bridge_solana = "So11111111111111111111111111111111111111112"

[programs.mainnet]
white_protocol = "C9GAJTFVgijNzB4SWZeNKmzruzjzrZ4H6J1DpKha9GoW"
white_bridge_solana = "So11111111111111111111111111111111111111112"

# Shadow deployment: testnet program IDs for extended validation before mainnet upgrade.
# These are separate deployments used for soak-testing. Replace with real keypairs.
[programs.testnet]
white_protocol = "ShadowWht1111111111111111111111111111111111"
white_bridge_solana = "ShadowBrg1111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false
