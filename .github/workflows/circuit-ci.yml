name: Circuit CI

on:
  workflow_dispatch:
    inputs:
      compile:
        description: 'Recompile circuits (slow)'
        required: false
        default: 'false'

jobs:
  circuit-artifact-check:
    name: Circuit Artifact Presence Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./chains/solana
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: chains/solana/package.json

      - name: Install Node Dependencies
        run: npm ci

      - name: Check Circuit Artifacts
        run: npx tsx scripts/check-circuit-artifacts.ts

  circuit-compile:
    name: Circuit Compile (Manual — Slow)
    runs-on: ubuntu-latest
    if: github.event.inputs.compile == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Circom & SnarkJS
        run: |
          npm install -g circom snarkjs

      - name: Download Powers of Tau
        run: |
          mkdir -p circuits/build
          if [ ! -f circuits/build/powersOfTau28_hez_final_16.ptau ]; then
            curl -L -o circuits/build/powersOfTau28_hez_final_16.ptau \
              https://hermez.s3-eu-west-1.amazonaws.com/powersOfTau28_hez_final_16.ptau
          fi

      - name: Build Circuits
        run: bash circuits/build.sh
