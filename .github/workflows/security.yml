name: Security Guards

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  no-secret-artifact-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Scanner self-test
        run: npm run security:no-secret-scan:self-test
      - name: No-secret/artifact scan
        run: npm run security:no-secret-scan

  dependency-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Non-gating production dependency audit
        run: npm audit --audit-level=high --omit=dev
