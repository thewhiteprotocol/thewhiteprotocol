# Render Blueprint for The White Protocol Relayer
# Deploys the relayer service from the repository root so workspace packages
# such as @thewhiteprotocol/core are built before the relayer.
services:
  - type: web
    name: thewhiteprotocol-relayer
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build:core && npm run build:relayer
    startCommand: npm run relayer:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: STATE_DIR
        value: /app/data
      # Solana Devnet
      - key: RPC_ENDPOINT
        value: https://api.devnet.solana.com
      - key: PROGRAM_ID
        value: C9GAJTFVgijNzB4SWZeNKmzruzjzrZ4H6J1DpKha9GoW
      - key: POOL_CONFIG
        value: EYjYoV3RpvmYBcUi6LVGaYUzCbEjeHxga7nE7D5GEgaS
      - key: MERKLE_TREE
        value: 2DjfHs3CYK22a4SAMSH2gt6eXRwSnBzm2f4gWvmos8sD
      - key: PENDING_BUFFER
        value: 7MzDFCdPEog6orC42jCXBz53zhqysQVq5vb5J7R1DAyw
      - key: WSOL_VAULT
        value: 629JMEcz1u4AjyahByEcQtyGF3TwDnBPY7nHhaLVB9PS
      # Base Sepolia
      - key: BASE_SEPOLIA_RPC_URL
        value: https://sepolia.base.org
      - key: BASE_PROTOCOL_ADDRESS
        value: 0x396e539bCDeAF48ab9526A13c6E688CBA69C059a
      # Ethereum Sepolia
      - key: ETHEREUM_SEPOLIA_RPC_URL
        value: https://ethereum-sepolia-rpc.publicnode.com
      - key: ETH_PROTOCOL_ADDRESS
        value: 0x5813d68a130C451420C670F5aA4a7D68F438101A
      # BNB Chain Testnet
      - key: BSC_TESTNET_RPC_URL
        value: https://bsc-testnet-rpc.publicnode.com
      - key: BSC_PROTOCOL_ADDRESS
        value: 0xE8efDE51cA7B4b0dAD84e5a7296Baac87A09029B
      # Polygon Amoy
      - key: POLYGON_AMOY_RPC_URL
        value: https://rpc-amoy.polygon.technology
      - key: POLYGON_AMOY_PROTOCOL_ADDRESS
        value: 0xE8efDE51cA7B4b0dAD84e5a7296Baac87A09029B
      # Protocol settings
      - key: FEE_BPS
        value: "50"
      # Solana Relayer Registry (optional dev/test override)
      # - key: RELAYER_ALLOW_MISSING_SOLANA_REGISTRY
      #   value: "false"
      # Hosted watcher dry-run rollout:
      # - set BRIDGE_WATCHER_ENABLED=true only after operator token is configured
      # - keep BRIDGE_WATCHER_DRY_RUN=true and BRIDGE_WATCHER_AUTO_FREEZE=false
      # - set BRIDGE_OPERATOR_API_TOKEN and optional BRIDGE_ALERT_WEBHOOK_URL as secrets
      - key: BRIDGE_WATCHER_ENABLED
        value: "false"
      - key: BRIDGE_WATCHER_DRY_RUN
        value: "true"
      - key: BRIDGE_WATCHER_AUTO_FREEZE
        value: "false"
      - key: BRIDGE_WATCHER_INTERVAL_MS
        value: "30000"
      - key: BRIDGE_WATCHER_FINDINGS_PATH
        value: /app/data/bridge-watcher-findings.json
      - key: BRIDGE_WATCHER_MAX_FINDINGS_PER_TICK
        value: "100"
      - key: BRIDGE_WATCHER_FINDING_RETENTION_DAYS
        value: "30"
      - key: BRIDGE_WATCHER_MIN_SEVERITY_TO_FREEZE
        value: critical
      - key: BRIDGE_WATCHER_OBSERVATION_WINDOW_HOURS
        value: "24"
      - key: BRIDGE_WATCHER_OBSERVATION_REPORT_PATH
        value: /app/data/bridge-watcher-observation-report.json
      - key: BRIDGE_WATCHER_OBSERVATION_LABEL
        value: hosted-testnet-dry-run
      # Bridge daemon paper/live-testnet mode:
      # - disabled by default
      # - paper mode may build signing/submission previews and must not submit
      # - live-testnet submission requires BRIDGE_ALLOW_LIVE_TESTNET_SUBMIT=true
      # - mainnet routes remain blocked
      - key: BRIDGE_DAEMON_MODE
        value: disabled
      - key: BRIDGE_ALLOW_LIVE_TESTNET_SUBMIT
        value: "false"
      - key: BRIDGE_ALLOW_LOCAL_DEV_SIGNER_IN_LIVE_TESTNET
        value: "false"
      - key: BRIDGE_DAEMON_INTERVAL_MS
        value: "30000"
      - key: BRIDGE_DAEMON_ROUTES
        value: ""
      - key: BRIDGE_DAEMON_STATE_PATH
        value: /app/data
      - key: BRIDGE_DAEMON_SCAN_LOOKBACK_BLOCKS
        value: "1000"
      - key: BRIDGE_DAEMON_SCAN_FROM_BLOCK
        value: ""
      - key: BRIDGE_DAEMON_SCAN_TO_BLOCK
        value: ""
      - key: BRIDGE_DAEMON_SUBMIT_TARGETS
        value: ""
      - key: BRIDGE_BASE_SEPOLIA_OUTBOX_ADDRESS
        value: 0x7eaFB77E2F05Bf0EbCb8F1A51B187BbcdBCb985D
      - key: SOLANA_DEVNET_RPC_URL
        value: ""
      - key: BRIDGE_SIGNER_THRESHOLD
        value: "2"
      - key: BRIDGE_SIGNER_SET_VERSION
        value: "1"
      - key: BRIDGE_ALERT_MIN_SEVERITY
        value: high
      - key: BRIDGE_ALERT_DRY_RUN
        value: "true"
      - key: BRIDGE_ALERT_LOG
        value: "false"
      - key: WITHDRAW_VK_PATH
        value: ./circuits/build/withdraw_vk.json
      - key: WITHDRAW_V2_VK_PATH
        value: ./circuits/build/withdraw_v2_vk.json
      - key: CIRCUITS_PATH
        value: ./circuits/build
      - key: TREE_DEPTH
        value: "20"
      - key: MIN_WITHDRAWAL
        value: "1000000"
      - key: MAX_WITHDRAWAL
        value: "1000000000000"
      - key: SUPPORTED_ASSETS
        value: So11111111111111111111111111111111111111112
      - key: CORS_ORIGIN
        value: https://app.thewhiteprotocol.com
      # Stealth address scanner (Solana + Base only)
      - key: STEALTH_SCANNER_POLL_INTERVAL_MS
        value: "5000"
      - key: STEALTH_SCANNER_BATCH_SIZE
        value: "100"
      - key: STEALTH_SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: STEALTH_BASE_RPC_URL
        value: https://sepolia.base.org
      - key: STEALTH_META_ADDRESS_VERSION
        value: "1"
      # Secrets — set these in Render dashboard, not here
      # - RELAYER_KEYPAIR
      # - AUTHORITY_KEYPAIR (optional; falls back to RELAYER_KEYPAIR)
      # - SEQUENCER_WALLET
      # - SEQUENCER_AUTH_TOKEN
      # - BRIDGE_OPERATOR_API_TOKEN
      # - BRIDGE_ALERT_WEBHOOK_URL
      # Signer custody:
      # - keep BRIDGE_SIGNER_MODE=local-dev only for local/test jobs
      # - env-file signer keys must be set only as hosted secrets and remain testnet-only
      # - KMS/HSM/MPC modes are placeholders until a future signer custody PR
      # - BRIDGE_ALLOW_ENV_SIGNER_IN_PRODUCTION must remain false
      # - BASE_DEPLOYER_PRIVATE_KEY
      # - ETH_DEPLOYER_PRIVATE_KEY
      # - BSC_DEPLOYER_PRIVATE_KEY
      # - POLYGON_AMOY_DEPLOYER_PRIVATE_KEY
      # - EVM_DEPLOYER_PRIVATE_KEY (shared fallback)
      # - WALLETCONNECT_PROJECT_ID (if needed)
