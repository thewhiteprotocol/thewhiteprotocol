services:
  - type: web
    name: white-protocol-relayer
    runtime: node
    rootDir: relayer
    buildCommand: npm ci && npm run build
    startCommand: npm start
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: LOG_LEVEL
        value: info
      - key: STATE_DIR
        value: /app/data
      - key: RPC_ENDPOINT
        fromGroup: white-protocol
      - key: RELAYER_KEYPAIR
        fromGroup: white-protocol
      - key: PROGRAM_ID
        value: "DbYzCrBEt1Efxf9LB2P7A6vqPjuA8ugDBh1kCunESJZk"
      - key: POOL_CONFIG
        value: "5tiLj9YYhsc28h1JVVBBeUmUKmwTEUEnzn7q86NNso6q"
      - key: MERKLE_TREE
        value: "3Zo9P2p8582y9mTbP49TUC7hk8aDDo5Sz3fYQBDFkFhc"
      - key: PENDING_BUFFER
        value: "4A63xarGARyQyq5C37kHQcZEixeoyKhkqEoocGGEkjxh"
      - key: WSOL_VAULT
        value: "5RBtEyYpEHcs1hPvR8yjcdRfreoUxHVDV4R8yFrS2VTR"
      - key: BASE_RPC_URL
        value: "https://sepolia.base.org"
      - key: BASE_PROTOCOL_ADDRESS
        value: "0xCE959493cf6F15314b4B9eEbb28369716341e7FE"
      - key: BASE_DEPLOYER_PRIVATE_KEY
        fromGroup: white-protocol
      - key: FEE_BPS
        value: "50"
      - key: MIN_WITHDRAWAL
        value: "1000000"
      - key: MAX_WITHDRAWAL
        value: "1000000000000"
      - key: WITHDRAW_VK_PATH
        value: "./circuits/build/withdraw_vk.json"
      - key: CIRCUITS_PATH
        value: "./circuits/build"
      - key: TREE_DEPTH
        value: "20"
      - key: CORS_ORIGIN
        value: "https://app.thewhiteprotocol.com,https://thewhiteprotocol.com"
      - key: SEQUENCER_AUTH_TOKEN
        generateValue: true
      - key: SUPPORTED_ASSETS
        value: "So11111111111111111111111111111111111111112"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=2048"
