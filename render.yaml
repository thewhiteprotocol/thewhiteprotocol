services:
  - type: web
    name: white-protocol-relayer
    runtime: node
    rootDir: relayer
    buildCommand: npm ci && npm run build
    startCommand: npm start
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: LOG_LEVEL
        value: info
      - key: STATE_DIR
        value: /app/data
      - key: RPC_ENDPOINT
        fromGroup: white-protocol
      - key: RELAYER_KEYPAIR
        fromGroup: white-protocol
      - key: PROGRAM_ID
        fromGroup: white-protocol
      - key: POOL_CONFIG
        fromGroup: white-protocol
      - key: FEE_BPS
        value: "50"
      - key: MIN_WITHDRAWAL
        value: "1000000"
      - key: MAX_WITHDRAWAL
        value: "1000000000000"
      - key: WITHDRAW_VK_PATH
        value: "./circuits/build/withdraw_vk.json"
      - key: CIRCUITS_PATH
        value: "./circuits/build"
      - key: TREE_DEPTH
        value: "20"
      - key: CORS_ORIGIN
        # Set this in your Render environment group to your Vercel domain(s)
        # e.g. "https://your-app.vercel.app"
        fromGroup: white-protocol
      - key: SEQUENCER_AUTH_TOKEN
        generateValue: true
